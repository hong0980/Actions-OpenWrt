name: Backup, Reset & Restore OpenWrt-Cache

on:
  workflow_dispatch: {}


jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: 从 OpenWrt-Cache 下载现有 Cache release 附件
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_TOKEN }}
        run: |
          mkdir -p assets
          gh release download Cache \
            --repo hong0980/OpenWrt-Cache \
            --dir assets \
            --pattern '*'
          echo "下载到的文件数："
          ls -la assets | wc -l

